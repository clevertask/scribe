name: Publish Package

on:
  workflow_dispatch:
    inputs:
      dist_tag:
        description: "npm dist-tag to publish under"
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    uses: clevertask/clevertask-public-workflows/.github/workflows/publish-npm.yml@main
    with:
      dist_tag: ${{ inputs.dist_tag }}
